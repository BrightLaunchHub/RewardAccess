<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Reward Access | 30 Exclusive Rewards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 80% 10%, #0a0c1a, #02040f);
      font-family: 'Inter', system-ui, sans-serif;
      padding: 2rem 1.5rem;
      min-height: 100vh;
    }

    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .content-area {
      flex: 3;
      min-width: 250px;
    }

    .level-sidebar {
      flex: 0.9;
      min-width: 200px;
      position: sticky;
      top: 2rem;
      align-self: flex-start;
      background: rgba(15, 20, 35, 0.75);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      padding: 1.5rem 1rem;
      border: 1px solid rgba(251, 146, 60, 0.5);
      height: fit-content;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .level-sidebar h3 {
      color: #ffd6a5;
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .level-sidebar h3 i {
      color: #fb923c;
    }

    .triggers-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .level-btn {
      background: linear-gradient(105deg, #1a1e32, #11152a);
      border: 1px solid #fb923c;
      border-radius: 60px;
      padding: 8px 0;
      text-align: center;
      font-weight: 700;
      font-size: 0.75rem;
      color: #ffdead;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .level-btn i {
      font-size: 0.75rem;
      color: #fb923c;
    }

    .level-btn:hover {
      background: linear-gradient(105deg, #2a2f4a, #1a1f38);
      border-color: #f97316;
      transform: translateY(-2px);
    }

    .level-btn.active {
      background: linear-gradient(105deg, #ea580c, #c2410c);
      border-color: #fdba74;
      color: white;
    }

    .level-btn.active i {
      color: #fff0e0;
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
    }

    .hero h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fb923c, #f97316, #fdba74);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hero h1 i {
      background: none;
      -webkit-text-fill-color: #fb923c;
      font-size: 2rem;
    }

    .stats-card {
      background: rgba(10, 14, 30, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1rem 1.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 2rem;
      margin-bottom: 0;
      border: 1px solid rgba(249, 115, 22, 0.4);
    }

    .total-box {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fcd9b6;
      font-weight: 600;
    }

    .total-box i {
      font-size: 2rem;
      color: #fb923c;
    }

    .total-number {
      background: #0a0e20;
      padding: 6px 20px;
      border-radius: 50px;
      font-size: 2rem;
      font-weight: 800;
      color: #fb923c;
      font-family: monospace;
      letter-spacing: 2px;
      border: 1px solid #f97316;
    }

    .legend {
      display: flex;
      gap: 20px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      color: #cbd5e1;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2d3a5e;
    }

    .dot.active {
      background: #10b981;
      box-shadow: 0 0 6px #34d399;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0 1rem 0;
      padding-bottom: 6px;
      border-bottom: 2px solid rgba(249, 115, 22, 0.5);
    }

    .section-title i {
      font-size: 1.5rem;
      color: #fb923c;
    }

    .section-title h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fee3c0;
    }

    .badge {
      background: #f97316;
      padding: 2px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #0a0a1a;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      max-height: 50vh;
      overflow-y: auto;
      padding-right: 8px;
    }

    .btn-grid::-webkit-scrollbar {
      width: 6px;
    }
    .btn-grid::-webkit-scrollbar-track {
      background: #1e253e;
      border-radius: 10px;
    }
    .btn-grid::-webkit-scrollbar-thumb {
      background: #fb923c;
      border-radius: 10px;
    }

    .offer-btn {
      background: linear-gradient(105deg, #13182e, #0c1022);
      border: 1px solid #3b3f66;
      border-radius: 60px;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      text-decoration: none;
      transition: all 0.25s ease;
      color: #e2e8f0;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .offer-btn:hover {
      transform: translateY(-3px);
      background: linear-gradient(105deg, #1c2340, #12172e);
      border-color: #fb923c;
      box-shadow: 0 8px 18px rgba(0,0,0,0.4);
    }

    .offer-btn.disabled {
      opacity: 0.6;
      cursor: not-allowed;
      pointer-events: none;
      background: linear-gradient(105deg, #1a2a1a, #0f1f0f);
      border-color: #4a6a4a;
      transform: none;
    }

    .btn-left {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow: hidden;
    }
    .btn-left i {
      font-size: 1.2rem;
      color: #fb923c;
      min-width: 28px;
      text-align: center;
    }
    .btn-left span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .click-count {
      background: #00000055;
      border-radius: 40px;
      padding: 3px 12px;
      font-size: 0.8rem;
      font-weight: 800;
      color: #fdba74;
      border: 0.5px solid #fb923c;
      font-family: monospace;
    }
    .offer-btn.clicked {
      background: linear-gradient(105deg, #0f3b2a, #0a261c);
      border-color: #10b981;
    }
    .offer-btn.clicked .click-count {
      background: #064e3b;
      color: #facc15;
    }

    .reset-btn {
      background: rgba(249, 115, 22, 0.15);
      border: 1px solid #f97316;
      border-radius: 50px;
      padding: 6px 18px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #fdba74;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .reset-btn:hover {
      background: #f9731630;
      color: #ffffff;
      border-color: #fb923c;
    }

    footer {
      margin-top: 1.5rem;
      text-align: center;
      color: #6b7280;
      font-size: 0.75rem;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    @media (max-width: 850px) {
      .main-container { flex-direction: column; }
      .level-sidebar { display: none; }
      .mobile-tier-bar {
        display: block;
        background: rgba(15, 20, 35, 0.85);
        backdrop-filter: blur(16px);
        border-radius: 1.5rem;
        padding: 1rem;
        margin-bottom: 1.5rem;
        border: 1px solid rgba(251, 146, 60, 0.5);
      }
      .mobile-tier-bar h3 {
        color: #ffd6a5;
        font-size: 1rem;
        text-align: center;
        margin-bottom: 0.8rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .mobile-triggers {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }
      .mobile-tier-btn {
        background: linear-gradient(105deg, #1a1e32, #11152a);
        border: 1px solid #fb923c;
        border-radius: 60px;
        padding: 6px 0;
        font-weight: 700;
        font-size: 0.65rem;
        color: #ffdead;
        cursor: pointer;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .mobile-tier-btn i { font-size: 0.65rem; color: #fb923c; }
      .mobile-tier-btn.active {
        background: linear-gradient(105deg, #ea580c, #c2410c);
        border-color: #fdba74;
        color: white;
      }
      .btn-grid { max-height: 45vh; }
      .stats-card { margin-top: 1.5rem; }
    }
    @media (min-width: 851px) {
      .mobile-tier-bar { display: none; }
    }
  </style>
</head>
<body>
<div class="main-container">
  <div class="content-area">
    <div class="hero">
      <h1><i class="fas fa-crown"></i> REWARD ACCESS <i class="fas fa-gem"></i></h1>
    </div>

    <div class="mobile-tier-bar" id="mobileTierBar">
      <h3><i class="fas fa-layer-group"></i> Choose Tier</h3>
      <div class="mobile-triggers" id="mobileTriggers"></div>
    </div>

    <div class="section-title" id="dynamicSectionTitle">
      <i class="fas fa-layer-group"></i>
      <h2 id="levelName">Tier 1 · Starter Pack</h2>
      <div class="badge" id="levelBadge">3 Offers</div>
    </div>
    <div id="offersGrid" class="btn-grid"></div>

    <div class="stats-card">
      <div class="total-box">
        <i class="fas fa-chart-line"></i>
        <span>Total Clicks</span>
        <div class="total-number" id="totalClicks">0</div>
      </div>
      <div class="legend">
        <span><i class="dot"></i> Pending</span>
        <span><i class="dot active"></i> Claimed</span>
      </div>
    </div>

    <footer>
      <span><i class="far fa-clock"></i> 30 Live Rewards · 10 Exclusive Tiers · Click & Collect</span>
      <div class="reset-btn" id="resetAllBtn"><i class="fas fa-trash-alt"></i> Reset Counters</div>
    </footer>
  </div>

  <div class="level-sidebar">
    <h3><i class="fas fa-layer-group"></i> Choose Tier</h3>
    <div class="triggers-grid" id="desktopTriggers"></div>
  </div>
</div>

<script>
  // ==================== 30 NEW LINKS (consumptionbackwardsentiments.com) ====================
  const ALL_LINKS = [
    "https://consumptionbackwardsentiments.com/w4gd60uzg?key=a149f5428128f016826d92122723b0ec",
    "https://consumptionbackwardsentiments.com/qpe3ku5jz?key=b9c409285ed84dbeb00f47be79860366",
    "https://consumptionbackwardsentiments.com/nfv247ne?key=ea91e359e816e04eb3610afadbab2d8a",
    "https://consumptionbackwardsentiments.com/ja3ihwrp?key=ecc7d2820c0856cc6daa4e7ec962d3f4",
    "https://consumptionbackwardsentiments.com/s0mqkbgv?key=5e9a1313bcde2874f8b07788cf7218e1",
    "https://consumptionbackwardsentiments.com/bht7yamqu?key=dab6d51aa7869c0bf86318924a771b92",
    "https://consumptionbackwardsentiments.com/vrrfj0v73t?key=683806b1a417ac629912a04531c98ee2",
    "https://consumptionbackwardsentiments.com/a04h64866?key=26a88f338f9c1db4b43c8ebfc5140498",
    "https://consumptionbackwardsentiments.com/n20bfzpm7?key=ed1d2a2f55c1e5928c2d8b1dfa867dad",
    "https://consumptionbackwardsentiments.com/xdhs3341?key=42660d62b48cb14660fa8819064bbb99",
    "https://consumptionbackwardsentiments.com/kxuqhk1f?key=a7798431bb50e8f8422b3f5f123fe08f",
    "https://consumptionbackwardsentiments.com/quwa0p590?key=f02efed4d44a785c287f00ddaf34a07c",
    "https://consumptionbackwardsentiments.com/f2kwzhg92u?key=7c881d802016e4b222bb61488c83a4a0",
    "https://consumptionbackwardsentiments.com/u2ct0nneg?key=b45c8d3efde871d58d0d9412db7e9b6c",
    "https://consumptionbackwardsentiments.com/qc04jkt82?key=ebf17386759cae1da5142481ec282d6d",
    "https://consumptionbackwardsentiments.com/c9kud6hb1?key=d7cb2897ba8ce1fe45aa835d74ec32ad",
    "https://consumptionbackwardsentiments.com/e6vnyy2pc?key=b2eb1da4226eda84df1ad46c7d0cc9ff",
    "https://consumptionbackwardsentiments.com/mfg0a248?key=6e9617313e60f8edeaab8fa76bd065e5",
    "https://consumptionbackwardsentiments.com/z5gb15wy0?key=56a96018842e896c6a173ac88704ee40",
    "https://consumptionbackwardsentiments.com/i0hnnec2?key=443dade50cd686c2e172adc709e35e2c",
    "https://consumptionbackwardsentiments.com/uptxr06h0?key=179ed11afe451edfd60ec4c3393eae6f",
    "https://consumptionbackwardsentiments.com/g6p1zch9eg?key=3fbbce0fb0f50e472396216c45803202",
    "https://consumptionbackwardsentiments.com/j7zzumht7x?key=d9df604b0333008dd862ca45d6ba89c8",
    "https://consumptionbackwardsentiments.com/ifw33x1b?key=fb4ba3761972e01525b7aa8994e1fc76",
    "https://consumptionbackwardsentiments.com/p8be7mzv00?key=5575629712c1445e3bd8a27573b9b447",
    "https://consumptionbackwardsentiments.com/u4t2actrv6?key=39349037f20abcbd53178f570c8493bb",
    "https://consumptionbackwardsentiments.com/sse66b839r?key=da2127ddf367a55e2ef67cd46b311a84",
    "https://consumptionbackwardsentiments.com/qq45064c?key=f2c8412c845c1bbc86584dcf50c35ed8",
    "https://consumptionbackwardsentiments.com/vc00nszb?key=7e7df47ed375cbd2bb6964f29407f077",
    "https://consumptionbackwardsentiments.com/j83rsvrjic?key=90d8c49f38173b7172f1f0cd61695f25"
  ];

  // ========== USER-FRIENDLY & AD-COMPLIANT OFFER NAMES (30 unique, warm & engaging) ==========
  const OFFER_NAMES = [
    "✨ Daily Welcome Gift", "🎁 Simple Bonus Pack", "💎 Gentle Reward Vault", "⚡ Easy Access Pass", "🍀 Kind Lucky Token",
    "🏆 Friendly Achievement", "🚀 Smooth Boost Voucher", "🎯 Gentle Bonus Deal", "🔑 Warm Access Key", "📀 Simple Digital Pack",
    "🕹️ Calm Player Perk", "🎧 Soft Audio Bonus", "📱 Light Mobile Reward", "💡 Bright Simple Offer", "🛡️ Cozy Secure Pack",
    "📚 Kind Insider Pass", "🎨 Gentle Creator Kit", "⚙️ Easy Utility Perk", "🔔 Soft Alert Reward", "🌐 Warm Global Pass",
    "🧩 Friendly Mystery Bonus", "🎵 Calm Sound Reward", "📸 Soft Snapshot Gift", "🕶️ Gentle Stealth Perk", "🌿 Pure Lucky Charm",
    "🧭 Kind Navigator Pack", "🎲 Simple Roll Bonus", "🃏 Gentle Wild Reward", "🎈 Soft Celebration Pack", "⭐ Pure Welcome Bonus"
  ];

  // Matching icons for each offer (FontAwesome compatible)
  const OFFER_ICONS = [
    "star", "gift", "gem", "bolt", "leaf", "trophy", "rocket", "bullseye", "key", "database",
    "gamepad", "headphones", "mobile-alt", "lightbulb", "shield-alt", "book", "palette", "cogs", "bell", "globe",
    "puzzle-piece", "music", "camera", "sunglasses", "leaf", "compass", "dice-d6", "star-of-life", "balloon", "crown"
  ];

  // Shuffle array utility (Fisher-Yates) for unique order per user
  function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // Get persistent shuffled order for this user (so each user sees a unique sequence)
  function getShuffledIndices() {
    const ORDER_KEY = "rewardAccessShuffledOrderV1";
    const saved = localStorage.getItem(ORDER_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed.length === 30) return parsed;
    }
    const indices = Array.from({ length: 30 }, (_, i) => i);
    shuffleArray(indices);
    localStorage.setItem(ORDER_KEY, JSON.stringify(indices));
    return indices;
  }

  const shuffledOrder = getShuffledIndices();

  // Build tier offers using shuffled order (3 per tier)
  const TIER_OFFERS = {};
  for (let tier = 1; tier <= 10; tier++) {
    TIER_OFFERS[tier] = [];
    for (let j = 0; j < 3; j++) {
      const globalIdx = shuffledOrder[(tier - 1) * 3 + j];
      TIER_OFFERS[tier].push({
        name: OFFER_NAMES[globalIdx % OFFER_NAMES.length],
        icon: OFFER_ICONS[globalIdx % OFFER_ICONS.length],
        link: ALL_LINKS[globalIdx],
        originalIndex: globalIdx
      });
    }
  }

  const TOTAL_OFFERS = 30;
  let clickCounts = new Array(TOTAL_OFFERS).fill(0);
  let claimedStatus = new Array(TOTAL_OFFERS).fill(false);
  const STORAGE_KEY = "rewardAccessClicksV1";
  const CLAIMED_KEY = "rewardAccessClaimedV1";

  function loadCounts() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        let arr = JSON.parse(saved);
        if (arr.length === TOTAL_OFFERS) clickCounts = arr;
      } catch(e) {}
    }
    const savedClaimed = localStorage.getItem(CLAIMED_KEY);
    if (savedClaimed) {
      try {
        let arr = JSON.parse(savedClaimed);
        if (arr.length === TOTAL_OFFERS) claimedStatus = arr;
      } catch(e) {}
    }
  }
  function saveCounts() { 
    localStorage.setItem(STORAGE_KEY, JSON.stringify(clickCounts));
    localStorage.setItem(CLAIMED_KEY, JSON.stringify(claimedStatus));
  }
  function updateTotalDisplay() {
    const total = clickCounts.reduce((a,b)=>a+b,0);
    document.getElementById("totalClicks").innerText = total;
  }

  let currentTier = 1;

  function renderCurrentTier() {
    const grid = document.getElementById("offersGrid");
    grid.innerHTML = "";
    const offers = TIER_OFFERS[currentTier];
    const tierNames = ["Starter Pack", "Bronze Tier", "Silver Tier", "Gold Tier", "Platinum Tier", "Emerald Tier", "Ruby Tier", "Sapphire Tier", "Diamond Tier", "Ultimate Vault"];
    const levelTitle = document.getElementById("levelName");
    const levelBadge = document.getElementById("levelBadge");
    levelTitle.innerText = `Tier ${currentTier} · ${tierNames[currentTier-1]}`;
    levelBadge.innerText = "3 Offers";

    offers.forEach((offer) => {
      const globalIdx = offer.originalIndex;
      const count = clickCounts[globalIdx];
      const isClaimed = claimedStatus[globalIdx];
      const hasClick = count > 0;
      
      const btn = document.createElement("a");
      if (!isClaimed) {
        btn.href = offer.link;
        btn.target = "_blank";
        btn.rel = "noopener noreferrer";
      } else {
        btn.href = "javascript:void(0);";
      }
      btn.className = `offer-btn ${hasClick ? "clicked" : ""} ${isClaimed ? "disabled" : ""}`;
      btn.setAttribute("data-global", globalIdx);
      
      btn.innerHTML = `<div class="btn-left"><i class="fas fa-${offer.icon}"></i><span>${offer.name}</span></div><div class="click-count">${count}</div>`;
      
      if (!isClaimed) {
        btn.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (claimedStatus[globalIdx]) return false;
          
          // One-time claim: mark claimed and increment
          claimedStatus[globalIdx] = true;
          clickCounts[globalIdx] += 1;
          saveCounts();
          updateTotalDisplay();
          renderCurrentTier();  // re-render to disable this button
          
          // Open link in new tab
          window.open(offer.link, "_blank");
          return false;
        });
      } else {
        btn.style.cursor = "not-allowed";
        btn.onclick = (e) => { e.preventDefault(); return false; };
      }
      
      grid.appendChild(btn);
    });
  }

  function setActiveTier(tier) {
    currentTier = tier;
    document.querySelectorAll(".level-btn").forEach(btn => {
      if (parseInt(btn.getAttribute("data-level")) === tier) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    document.querySelectorAll(".mobile-tier-btn").forEach(btn => {
      if (parseInt(btn.getAttribute("data-level")) === tier) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    renderCurrentTier();
  }

  function resetCounters() {
    for (let i = 0; i < TOTAL_OFFERS; i++) {
      clickCounts[i] = 0;
      claimedStatus[i] = false;
    }
    saveCounts();
    updateTotalDisplay();
    renderCurrentTier();
  }

  function buildTriggers() {
    const desktopContainer = document.getElementById("desktopTriggers");
    const mobileContainer = document.getElementById("mobileTriggers");
    desktopContainer.innerHTML = "";
    mobileContainer.innerHTML = "";
    for (let i = 1; i <= 10; i++) {
      const dBtn = document.createElement("div");
      dBtn.className = "level-btn";
      dBtn.setAttribute("data-level", i);
      dBtn.innerHTML = `<i class="fas fa-tag"></i> ${i}`;
      dBtn.addEventListener("click", () => setActiveTier(i));
      desktopContainer.appendChild(dBtn);
      const mBtn = document.createElement("div");
      mBtn.className = "mobile-tier-btn";
      mBtn.setAttribute("data-level", i);
      mBtn.innerHTML = `<i class="fas fa-tag"></i> ${i}`;
      mBtn.addEventListener("click", () => setActiveTier(i));
      mobileContainer.appendChild(mBtn);
    }
  }

  document.getElementById("resetAllBtn").addEventListener("click", resetCounters);
  loadCounts();
  buildTriggers();
  setActiveTier(1);
  updateTotalDisplay();
</script>
</body>
</html>
